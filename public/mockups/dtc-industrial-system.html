<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DTC E-Lock - Industrial System Study</title>
  <style>
    /* Hallmark - pre-emit critique: P5 H5 E5 S5 R5 V5 */
    :root {
      --color-paper: #efefea;
      --color-paper-2: #e5e5df;
      --color-ink: #090909;
      --color-muted: #62625d;
      --color-accent: #e5231e;
      --color-stage: #15171b;
      --color-stage-line: #353941;
      --color-stage-text: #f4f5f7;
      --font-display: Arial, Helvetica, sans-serif;
      --font-data: ui-monospace, "SFMono-Regular", Consolas, monospace;
      --control-h: 52px;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; overflow-x: clip; }
    body { margin: 0; color: var(--color-ink); background: var(--color-stage); font-family: var(--font-display); letter-spacing: 0; }
    button, input, select, textarea { font: inherit; letter-spacing: 0; }
    button, a, select { -webkit-tap-highlight-color: transparent; }
    svg { display: block; }
    .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .study-bar {
      min-height: var(--control-h);
      display: grid;
      grid-template-columns: auto minmax(260px, 720px) auto;
      align-items: center;
      gap: 18px;
      padding: 7px 14px;
      color: var(--color-stage-text);
      background: var(--color-stage);
      border-bottom: 1px solid var(--color-stage-line);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .study-title { font: 800 10px var(--font-data); text-transform: uppercase; white-space: nowrap; }
    .study-title span { color: #858c99; }
    .route-picker { display: grid; grid-template-columns: auto minmax(0, 1fr) auto; align-items: center; gap: 8px; }
    .route-step, .mode-button {
      min-height: 34px;
      border: 1px solid var(--color-stage-line);
      color: #b8bec8;
      background: #1d2026;
      cursor: pointer;
      font: 800 9px var(--font-data);
      text-transform: uppercase;
    }
    .route-step { width: 38px; }
    .route-step:hover, .mode-button:hover { color: white; border-color: #69717e; }
    .route-step:active, .mode-button:active { transform: translateY(1px); }
    .route-select {
      min-width: 0;
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--color-stage-line);
      color: white;
      background: #1d2026;
      font: 750 10px var(--font-data);
      text-transform: uppercase;
    }
    .mode-control { display: grid; grid-template-columns: repeat(2, 76px); gap: 3px; padding: 3px; border: 1px solid var(--color-stage-line); background: #1d2026; }
    .mode-button { min-height: 28px; border: 0; background: transparent; }
    .mode-button[aria-selected="true"] { color: var(--color-ink); background: white; }

    .stage { min-height: calc(100vh - var(--control-h)); padding: 0; background: var(--color-stage); }
    .preview {
      width: 100%;
      min-height: calc(100vh - var(--control-h));
      margin: 0 auto;
      background: var(--color-paper);
      container-type: inline-size;
      transition: width 180ms ease;
    }
    .preview.is-mobile { width: min(390px, 100%); height: 844px; min-height: 0; overflow-y: auto; scrollbar-width: thin; }
    .app { min-height: max(844px, calc(100vh - var(--control-h))); display: grid; grid-template-columns: 176px minmax(0, 1fr); grid-template-rows: 76px minmax(0, 1fr); color: var(--color-ink); background: var(--color-paper); }

    .brand { display: grid; place-items: center; padding: 10px; border-right: 2px solid var(--color-ink); border-bottom: 2px solid var(--color-ink); }
    .brand img { width: 144px; filter: grayscale(1) contrast(1.85); mix-blend-mode: multiply; }
    .mast { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; border-bottom: 2px solid var(--color-ink); }
    .mast > * { min-width: 0; display: flex; align-items: center; padding: 0 18px; border-right: 1px solid var(--color-ink); font: 800 10px var(--font-data); text-transform: uppercase; }
    .mast > *:last-child { border-right: 0; }
    .mast-id b { margin-right: 10px; color: var(--color-accent); }
    .live-mark { width: 8px; height: 8px; margin-right: 9px; background: var(--color-accent); }
    .rail { min-height: 0; display: flex; flex-direction: column; border-right: 2px solid var(--color-ink); }
    .nav { display: grid; }
    .nav button {
      min-height: 49px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      align-items: center;
      padding: 0 13px;
      border: 0;
      border-bottom: 1px solid var(--color-ink);
      color: var(--color-ink);
      background: transparent;
      cursor: pointer;
      font: 800 9px var(--font-data);
      text-align: left;
      text-transform: uppercase;
    }
    .nav button:hover { background: var(--color-paper-2); }
    .nav button.is-active { color: white; background: var(--color-ink); }
    .nav button.is-active::after { content: "///"; color: var(--color-accent); }
    .rail-foot { margin-top: auto; padding: 14px 12px; border-top: 2px solid var(--color-ink); font: 750 8px/1.55 var(--font-data); text-transform: uppercase; }
    .main { min-width: 0; }
    .mobile-nav { display: none; }

    .page-head { min-height: 122px; display: grid; grid-template-columns: minmax(0, 1fr) minmax(220px, 30%); border-bottom: 2px solid var(--color-ink); }
    .page-title { min-width: 0; padding: 20px 22px 16px; border-right: 2px solid var(--color-ink); }
    .eyebrow, .section-title, .label, .hint, th, .micro { font-family: var(--font-data); text-transform: uppercase; }
    .eyebrow { display: flex; justify-content: space-between; gap: 18px; font-size: 9px; font-weight: 800; }
    .eyebrow b { color: var(--color-accent); }
    .page-title h1 { min-width: 0; margin: 13px 0 0; font-size: clamp(42px, 5.2vw, 78px); line-height: .82; font-weight: 900; letter-spacing: 0; text-transform: uppercase; overflow-wrap: anywhere; }
    .page-title h1 em { color: var(--color-accent); font-style: normal; }
    .page-brief { display: grid; align-content: center; gap: 9px; padding: 18px 20px; }
    .page-brief strong { font-size: 28px; line-height: .9; }
    .page-brief p { max-width: 35ch; margin: 0; color: var(--color-muted); font: 750 9px/1.5 var(--font-data); text-transform: uppercase; }
    .page-brief .danger { color: var(--color-accent); }

    .section-title { min-height: 42px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 14px; border-bottom: 1px solid var(--color-ink); font-size: 9px; font-weight: 800; }
    .section-title b { color: var(--color-accent); }
    .panel { min-width: 0; border-right: 1px solid var(--color-ink); border-bottom: 1px solid var(--color-ink); }
    .panel:last-child { border-right: 0; }
    .panel-body { padding: 14px; }
    .metric-strip { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); border-bottom: 2px solid var(--color-ink); }
    .metric { min-height: 94px; padding: 13px 14px; border-right: 1px solid var(--color-ink); }
    .metric:last-child { border-right: 0; }
    .metric span { display: block; font: 800 8px var(--font-data); text-transform: uppercase; }
    .metric strong { display: block; margin-top: 12px; font-size: 31px; line-height: 1; letter-spacing: 0; }
    .metric small { display: block; margin-top: 6px; color: var(--color-muted); font: 750 7px var(--font-data); text-transform: uppercase; }
    .metric.is-red strong { color: var(--color-accent); }
    .button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border: 1px solid var(--color-ink);
      color: var(--color-paper);
      background: var(--color-ink);
      cursor: pointer;
      font: 800 9px var(--font-data);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .button:hover { color: white; background: var(--color-accent); border-color: var(--color-accent); }
    .button:active { transform: translateY(1px); }
    .button.secondary { color: var(--color-ink); background: transparent; }
    .button.secondary:hover { color: white; background: var(--color-ink); border-color: var(--color-ink); }
    .button.danger { color: white; background: var(--color-accent); border-color: var(--color-accent); }
    .field { min-width: 0; display: grid; gap: 6px; }
    .field label, .label { font: 800 8px var(--font-data); text-transform: uppercase; }
    .input, .select, .textarea { width: 100%; min-width: 0; border: 1px solid var(--color-ink); color: var(--color-ink); background: transparent; outline: none; }
    .input, .select { height: 40px; padding: 0 11px; }
    .textarea { min-height: 76px; padding: 10px 11px; resize: none; }
    .input:focus, .select:focus, .textarea:focus { box-shadow: inset 4px 0 0 var(--color-accent); }
    .field-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .serial-field { display: grid; grid-template-columns: 42px minmax(0, 1fr) 42px; border: 1px solid var(--color-ink); }
    .serial-field b, .serial-field span { display: grid; place-items: center; font: 800 10px var(--font-data); }
    .serial-field b { border-right: 1px solid var(--color-ink); }
    .serial-field span { border-left: 1px solid var(--color-ink); color: var(--color-accent); }
    .serial-field input { min-width: 0; height: 39px; padding: 0 10px; border: 0; color: var(--color-ink); background: transparent; outline: none; font: 750 10px var(--font-data); }
    .stack { display: grid; gap: 10px; }
    .status-list { margin: 0; }
    .status-line { min-height: 48px; display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 14px; padding: 0 14px; border-bottom: 1px solid var(--color-ink); }
    .status-line:last-child { border-bottom: 0; }
    .status-line dt, .status-line dd { margin: 0; font: 750 9px var(--font-data); text-transform: uppercase; }
    .status-line dd { text-align: right; }
    .status-line dd.red { color: var(--color-accent); }
    .table-wrap { min-width: 0; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { height: 36px; padding: 0 10px; border-right: 1px solid var(--color-ink); border-bottom: 1px solid var(--color-ink); color: var(--color-muted); font-size: 7px; text-align: left; }
    td { min-width: 0; height: 45px; padding: 8px 10px; border-right: 1px solid var(--color-ink); border-bottom: 1px solid var(--color-ink); font: 750 9px/1.25 var(--font-data); overflow-wrap: anywhere; }
    th:last-child, td:last-child { border-right: 0; }
    tbody tr:last-child td { border-bottom: 0; }
    td strong { display: block; font: inherit; }
    td small { display: block; margin-top: 3px; color: var(--color-muted); font-size: 7px; text-transform: uppercase; }
    .tag { display: inline-flex; align-items: center; min-height: 20px; padding: 0 7px; border: 1px solid var(--color-ink); font: 800 7px var(--font-data); text-transform: uppercase; white-space: nowrap; }
    .tag.red { color: white; background: var(--color-accent); border-color: var(--color-accent); }
    .tag.black { color: white; background: var(--color-ink); }
    .empty { min-height: 150px; display: grid; place-items: center; padding: 20px; text-align: center; }
    .empty strong { display: block; font-size: 48px; line-height: 1; }
    .empty span { display: block; margin-top: 8px; color: var(--color-muted); font: 750 8px var(--font-data); text-transform: uppercase; }
    .choice-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); border: 1px solid var(--color-ink); }
    .choice { min-height: 58px; border: 0; border-right: 1px solid var(--color-ink); color: var(--color-ink); background: transparent; cursor: pointer; font: 800 8px var(--font-data); text-transform: uppercase; }
    .choice:last-child { border-right: 0; }
    .choice.is-active { color: white; background: var(--color-ink); }
    .choice:hover { box-shadow: inset 0 -4px 0 var(--color-accent); }
    .footer-note { min-height: 42px; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 0 14px; border-top: 1px solid var(--color-ink); color: var(--color-muted); font: 750 8px var(--font-data); text-transform: uppercase; }

    .dashboard-grid { display: grid; grid-template-columns: minmax(0, 1.55fr) minmax(280px, .65fr); }
    .attention-row { min-height: 59px; display: grid; grid-template-columns: 58px minmax(0, 1fr) 96px; align-items: center; border-bottom: 1px solid var(--color-ink); }
    .attention-row data { height: 100%; display: grid; place-items: center; border-right: 1px solid var(--color-ink); color: var(--color-accent); font: 900 18px var(--font-data); }
    .attention-row div { min-width: 0; padding: 0 13px; }
    .attention-row strong { display: block; font: 800 9px var(--font-data); text-transform: uppercase; }
    .attention-row small { display: block; margin-top: 4px; color: var(--color-muted); font: 750 7px var(--font-data); text-transform: uppercase; }
    .attention-row span { padding-right: 12px; color: var(--color-muted); font: 750 7px var(--font-data); text-align: right; text-transform: uppercase; }
    .quick-strip { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); border-bottom: 2px solid var(--color-ink); }
    .quick-strip button { min-height: 63px; display: grid; place-items: center; gap: 4px; border: 0; border-right: 1px solid var(--color-ink); background: transparent; cursor: pointer; font: 800 8px var(--font-data); text-transform: uppercase; }
    .quick-strip button:last-child { border-right: 0; }
    .quick-strip button:hover { color: white; background: var(--color-ink); }

    .workbench { display: grid; grid-template-columns: minmax(290px, .75fr) minmax(0, 1.5fr) minmax(240px, .55fr); }
    .workbench > .panel { min-height: 300px; }
    .workbench .wide { grid-column: span 2; }
    .ledger { grid-column: 1 / -1; }
    .load-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }
    .kit-map { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); border: 1px solid var(--color-ink); }
    .kit-node { min-height: 84px; display: grid; align-content: center; gap: 8px; padding: 10px; border-right: 1px solid var(--color-ink); }
    .kit-node:last-child { border-right: 0; }
    .kit-node b { color: var(--color-accent); font: 900 16px var(--font-data); }
    .kit-node span { font: 750 8px var(--font-data); overflow-wrap: anywhere; }
    .check-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); border: 1px solid var(--color-ink); }
    .check { min-height: 52px; display: grid; grid-template-columns: 22px minmax(0, 1fr); align-items: center; gap: 8px; padding: 0 10px; border-right: 1px solid var(--color-ink); border-bottom: 1px solid var(--color-ink); font: 750 8px var(--font-data); text-transform: uppercase; }
    .check:nth-child(2n) { border-right: 0; }
    .check:nth-last-child(-n+2) { border-bottom: 0; }
    .check i { width: 16px; height: 16px; display: grid; place-items: center; border: 1px solid var(--color-ink); color: white; background: var(--color-ink); font: 800 8px var(--font-data); font-style: normal; }

    .fault-layout { display: grid; grid-template-columns: minmax(300px, .8fr) minmax(0, 1.3fr) minmax(250px, .65fr); }
    .hazard-block { padding: 16px; color: white; background: var(--color-accent); }
    .hazard-block .input { color: white; border-color: white; }
    .hazard-block .input::placeholder { color: #ffd4d2; }
    .type-matrix { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); border: 1px solid var(--color-ink); }
    .type-matrix button { min-height: 48px; border: 0; border-right: 1px solid var(--color-ink); border-bottom: 1px solid var(--color-ink); background: transparent; font: 800 8px var(--font-data); text-transform: uppercase; }
    .type-matrix button:nth-child(2n) { border-right: 0; }
    .type-matrix button:nth-last-child(-n+2) { border-bottom: 0; }
    .type-matrix button.is-active { color: white; background: var(--color-ink); }

    .movement-map { display: grid; grid-template-columns: minmax(0, 1fr) 80px minmax(0, 1fr); border: 1px solid var(--color-ink); }
    .movement-point { min-height: 152px; display: grid; align-content: center; gap: 8px; padding: 15px; }
    .movement-point span { font: 800 8px var(--font-data); text-transform: uppercase; }
    .movement-point strong { font-size: 24px; overflow-wrap: anywhere; }
    .movement-arrow { display: grid; place-items: center; border-inline: 1px solid var(--color-ink); color: var(--color-accent); font: 900 22px var(--font-data); }

    .lookup-bar { display: grid; grid-template-columns: minmax(0, 1fr) auto; border-bottom: 2px solid var(--color-ink); }
    .lookup-bar input { min-width: 0; height: 76px; padding: 0 20px; border: 0; color: var(--color-ink); background: transparent; font-size: clamp(22px, 3vw, 42px); font-weight: 900; letter-spacing: 0; outline: none; }
    .lookup-bar button { width: 110px; border: 0; color: white; background: var(--color-accent); font: 900 11px var(--font-data); }
    .dossier { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); border-bottom: 2px solid var(--color-ink); }
    .dossier-cell { min-height: 88px; padding: 13px; border-right: 1px solid var(--color-ink); }
    .dossier-cell:last-child { border-right: 0; }
    .dossier-cell span { display: block; font: 800 8px var(--font-data); text-transform: uppercase; }
    .dossier-cell strong { display: block; margin-top: 11px; font: 900 15px var(--font-data); overflow-wrap: anywhere; }

    .verify-layout { display: grid; grid-template-columns: minmax(0, 1fr) 70px minmax(0, 1fr); border-bottom: 2px solid var(--color-ink); }
    .verify-side .section-title { background: var(--color-paper-2); }
    .verify-divider { display: grid; place-items: center; color: white; background: var(--color-ink); font: 900 12px var(--font-data); text-transform: uppercase; writing-mode: vertical-rl; }
    .compare-row { min-height: 58px; display: grid; grid-template-columns: 42px minmax(0, 1fr) auto; align-items: center; gap: 10px; padding: 0 12px; border-bottom: 1px solid var(--color-ink); }
    .compare-row:last-child { border-bottom: 0; }
    .compare-row b { color: var(--color-accent); font: 900 13px var(--font-data); }
    .compare-row strong { font: 800 9px var(--font-data); overflow-wrap: anywhere; }
    .compare-row span { color: var(--color-muted); font: 750 7px var(--font-data); text-transform: uppercase; }

    .review-layout { display: grid; grid-template-columns: minmax(280px, .8fr) minmax(0, 1.25fr) minmax(230px, .55fr); min-height: 570px; }
    .review-list button { width: 100%; min-height: 66px; display: grid; grid-template-columns: 42px minmax(0, 1fr) auto; align-items: center; border: 0; border-bottom: 1px solid var(--color-ink); color: var(--color-ink); background: transparent; text-align: left; }
    .review-list button.is-active { color: white; background: var(--color-ink); }
    .review-list data { color: var(--color-accent); font: 900 14px var(--font-data); text-align: center; }
    .review-list strong { font: 800 8px var(--font-data); text-transform: uppercase; }
    .review-list small { display: block; margin-top: 4px; color: var(--color-muted); font: 750 7px var(--font-data); text-transform: uppercase; }
    .review-list button.is-active small { color: #b9b9b5; }
    .review-list span { padding-right: 10px; font: 750 7px var(--font-data); text-transform: uppercase; }
    .evidence { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); border-bottom: 1px solid var(--color-ink); }
    .evidence > div { min-height: 78px; padding: 13px; border-right: 1px solid var(--color-ink); }
    .evidence > div:nth-child(2n) { border-right: 0; }
    .evidence span { display: block; color: var(--color-muted); font: 750 7px var(--font-data); text-transform: uppercase; }
    .evidence strong { display: block; margin-top: 9px; font: 900 10px var(--font-data); overflow-wrap: anywhere; }
    .decision-stack { display: grid; gap: 8px; padding: 14px; }
    .decision-stack .button { width: 100%; }

    .settings-layout { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(270px, .65fr); }
    .settings-stack { display: grid; }
    .theme-options { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); border: 1px solid var(--color-ink); }
    .theme-option { min-height: 80px; display: grid; align-content: end; gap: 8px; padding: 10px; border-right: 1px solid var(--color-ink); background: transparent; }
    .theme-option:last-child { border-right: 0; }
    .theme-option i { width: 100%; height: 20px; display: block; border: 1px solid var(--color-ink); background: var(--color-paper); }
    .theme-option:nth-child(2) i { background: var(--color-ink); }
    .theme-option:nth-child(3) i { background: var(--color-paper); box-shadow: inset -36px 0 0 var(--color-ink); }
    .theme-option span { font: 800 8px var(--font-data); text-transform: uppercase; }
    .theme-option.is-active { box-shadow: inset 0 -5px 0 var(--color-accent); }

    @container (max-width: 680px) {
      .app { display: block; min-height: 844px; padding-bottom: 58px; }
      .brand, .rail { display: none; }
      .mast { min-height: 56px; grid-template-columns: minmax(0, 1fr) auto; }
      .mast > * { padding: 0 10px; }
      .mast-clock { display: none; }
      .mast-user { border-right: 0; }
      .main { min-height: 730px; }
      .page-head { min-height: 0; grid-template-columns: 1fr; }
      .page-title { padding: 16px 12px; border-right: 0; border-bottom: 1px solid var(--color-ink); }
      .eyebrow span:last-child { display: none; }
      .page-title h1 { margin-top: 12px; font-size: 48px; line-height: .86; }
      .page-brief { grid-template-columns: auto minmax(0, 1fr); align-items: center; padding: 12px; }
      .page-brief strong { font-size: 24px; }
      .metric-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metric { border-bottom: 1px solid var(--color-ink); }
      .metric:nth-child(2n) { border-right: 0; }
      .metric:last-child:nth-child(odd) { grid-column: 1 / -1; }
      .quick-strip { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .quick-strip button:nth-child(n+5) { display: none; }
      .dashboard-grid, .workbench, .fault-layout, .settings-layout { grid-template-columns: 1fr; }
      .panel { border-right: 0; }
      .workbench .wide, .ledger { grid-column: auto; }
      .workbench > .panel { min-height: 0; }
      .attention-row { grid-template-columns: 48px minmax(0, 1fr) 68px; }
      .field-row { grid-template-columns: 1fr; }
      .kit-map { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .kit-node { border-bottom: 1px solid var(--color-ink); }
      .kit-node:nth-child(2n) { border-right: 0; }
      .kit-node:nth-last-child(-n+2) { border-bottom: 0; }
      .load-row { grid-template-columns: 1fr; }
      .load-row .button { width: 100%; }
      .movement-map { grid-template-columns: 1fr; }
      .movement-arrow { min-height: 46px; border-inline: 0; border-block: 1px solid var(--color-ink); writing-mode: vertical-rl; }
      .lookup-bar { grid-template-columns: minmax(0, 1fr) 70px; }
      .lookup-bar input { height: 62px; padding: 0 12px; font-size: 22px; }
      .lookup-bar button { width: 70px; }
      .dossier { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .dossier-cell { border-bottom: 1px solid var(--color-ink); }
      .dossier-cell:nth-child(2n) { border-right: 0; }
      .dossier-cell:nth-last-child(-n+2) { border-bottom: 0; }
      .verify-layout { grid-template-columns: 1fr; }
      .verify-divider { min-height: 42px; writing-mode: horizontal-tb; }
      .review-layout { grid-template-columns: 1fr; min-height: 0; }
      .review-list button:nth-of-type(n+4) { display: none; }
      .review-layout > .panel:nth-child(2) { order: -1; }
      .evidence { grid-template-columns: 1fr; }
      .evidence > div { border-right: 0; border-bottom: 1px solid var(--color-ink); }
      .evidence > div:last-child { border-bottom: 0; }
      .theme-options { grid-template-columns: 1fr; }
      .theme-option { min-height: 54px; grid-template-columns: 72px minmax(0, 1fr); align-items: center; border-right: 0; border-bottom: 1px solid var(--color-ink); }
      .theme-option:last-child { border-bottom: 0; }
      .table-wrap table, .table-wrap thead, .table-wrap tbody { display: block; }
      .table-wrap thead { display: none; }
      .table-wrap tr { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); border-bottom: 1px solid var(--color-ink); }
      .table-wrap tbody tr:last-child { border-bottom: 0; }
      .table-wrap td { height: auto; min-height: 48px; display: grid; align-content: center; gap: 3px; border-right: 1px solid var(--color-ink); border-bottom: 1px solid var(--color-ink); }
      .table-wrap td:nth-child(2n) { border-right: 0; }
      .table-wrap td::before { content: attr(data-label); color: var(--color-muted); font: 750 7px var(--font-data); text-transform: uppercase; }
      .mobile-nav { min-height: 58px; display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); position: sticky; bottom: 0; z-index: 20; border-top: 2px solid var(--color-ink); background: var(--color-paper); }
      .mobile-nav button { min-width: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: 0; border-right: 1px solid var(--color-ink); color: var(--color-ink); background: transparent; font: 750 7px var(--font-data); text-transform: uppercase; }
      .mobile-nav button:last-child { border-right: 0; }
      .mobile-nav button.is-active { color: white; background: var(--color-ink); }
      .mobile-nav .icon { width: 16px; height: 16px; }
    }

    @media (max-width: 760px) {
      .study-bar { grid-template-columns: 1fr auto; gap: 8px; }
      .study-title { display: none; }
      .route-picker { min-width: 0; }
      .mode-control { grid-template-columns: repeat(2, 58px); }
      .stage { min-height: 0; }
      .preview, .preview.is-mobile { width: 100%; height: auto; min-height: calc(100vh - var(--control-h)); overflow: visible; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; }
    }
  </style>
</head>

  <script>

    const pages = {
      dashboard: () => `${head('dashboard','Fleet','378','Fleet operational register','32%','Registered fleet utilization. 822 mother locks remain available for assignment.')}<section class="metric-strip"><div class="metric is-red"><span>Open reviews</span><strong>38</strong><small>Decision required</small></div><div class="metric"><span>Registered kits</span><strong>1,188</strong><small>Total register</small></div><div class="metric"><span>In service</span><strong>378</strong><small>Active trucks</small></div><div class="metric"><span>Available mothers</span><strong>822</strong><small>Ready for install</small></div></section><section class="quick-strip"><button data-route="lookup">${icon('search')}Lookup</button><button data-route="verify">${icon('shield')}Verify</button><button data-route="register">${icon('box')}Register</button><button data-route="install">${icon('tool')}Install</button><button data-route="fault">${icon('alert')}Fault</button></section><section class="dashboard-grid"><div class="panel"><div class="section-title"><span>[ Attention register ]</span><b>38 / Open</b></div><div class="attention-row"><data>25</data><div><strong>Kit mismatch / Registry versus field state</strong><small>Verification route</small></div><span>Oldest first</span></div><div class="attention-row"><data>08</data><div><strong>Duplicate sub-lock / Serial conflict</strong><small>Manual decision</small></div><span>Review</span></div><div class="attention-row"><data>03</data><div><strong>Registration coverage / Incomplete</strong><small>Registry action</small></div><span>Review</span></div><div class="attention-row"><data>02</data><div><strong>Blocked registration / Sub-lock conflict</strong><small>Supervisor action</small></div><span>Review</span></div></div><div class="panel"><div class="section-title"><span>[ Fleet state ]</span><b>Live</b></div><dl class="status-list">${status('Registered kits','1,188')}${status('Assigned trucks','378')}${status('Available mothers','822')}${status('Faulty devices','0','red')}</dl></div></section>`,

/small></div><div class="metric"><span>Sync queue</span><strong>0</strong><small>All uploaded</small></div></section></div></section>`,

      verify: () => `${head('verify','Verify','Kit','Registry versus physical state','25!','Verification resolves a kit mismatch only when the physical scan matches the intended registry state.')}<section class="verify-layout"><div class="verify-side"><div class="section-title"><span>[ Registry state ]</span><b>Expected</b></div>${[['M','487068971398'],['B','487068936383'],['C','487068947612'],['D','487068968618']].map(([s,v])=>`<div class="compare-row"><b>${s}</b><strong>${v}</strong><span>Registered</span></div>`).join('')}</div><div class="verify-divider">Compare</div><div class="verify-side"><div class="section-title"><span>[ Physical scan ]</span><b>Observed</b></div>${[['M','487068971398'],['B','487068936383'],['C','Scan device'],['D','487068968618']].map(([s,v],i)=>`<div class="compare-row"><b>${s}</b><strong>${v}</strong><span>${i===2?'Missing':'Match'}</span></div>`).join('')}</div></section><section class="metric-strip"><div class="metric"><span>Truck</span><strong>FZE998DI</strong><small>Visible plate</small></div><div class="metric"><span>Matched</span><strong>3 / 4</strong><small>Physical scan</small></div><div class="metric is-red"><span>Difference</span><strong>01</strong><small>Slot C missing</small></div><div class="metric"><span>Resolution</span><strong>-</strong><small>Complete scan first</small></div></section><div class="footer-note"><span>Verification writes evidence before resolving review</span><button class="button">Complete verification >>></button></div>`,

      triage: () => `${head('triage','Repair','00','Device disposition workbench','Clear','No devices are presently awaiting repair. The workbench remains ready for a reported fault.')}<section class="workbench"><div class="panel"><div class="section-title"><span>[ Repair pool ]</span><b>0 items</b></div><div class="empty"><div><strong>00</strong><span>No devices awaiting triage</span></div></div></div><div class="panel wide"><div class="section-title"><span>[ Selected device ]</span><b>None</b></div><div class="panel-body"><div class="choice-grid"><button class="choice">Return to service</button><button class="choice">Awaiting parts</button><button class="choice">Quarantine</button></div><dl class="status-list">${status('Device serial','-')}${status('Fault type','-')}${status('Truck','-')}${status('Reported','-')}</dl></div></div><div class="panel ledger"><div class="section-title"><span>[ Disposition rules ]</span><b>Controlled</b></div><div class="metric-strip"><div class="metric"><span>Repair pool</span><strong>0</strong><small>Active items</small></div><div class="metric"><span>Awaiting parts</span><strong>0</strong><small>Current state</small></div><div class="metric"><span>Quarantined</span><strong>0</strong><small>Unavailable</small></div><div class="metric"><span>Sync queue</span><strong>0</strong><small>All uploaded</small></div></div></div></section>`,

      review: () => `${head('review','Review','38','Evidence and decision control','38!','Each review exposes source data, conflicting state, operational impact and the correct resolution route.')}<section class="review-layout"><div class="panel review-list"><div class="section-title"><span>[ Open queue ]</span><b>Oldest first</b></div><button class="is-active"><data>25</data><div><strong>Kit mismatch</strong><small>Registry versus physical state</small></div><span>Verify</span></button><button><data>08</data><div><strong>Duplicate sub-lock</strong><small>Serial appears in two kits</small></div><span>Review</span></button><button><data>03</data><div><strong>Registration issue</strong><small>Coverage incomplete</small></div><span>Correct</span></button><button><data>02</data><div><strong>Blocked registration</strong><small>Sub-lock conflict</small></div><span>Resolve</span></button></div><div class="panel"><div class="section-title"><span>[ Review 001 / Evidence ]</span><b>Kit mismatch</b></div><div class="evidence"><div><span>Truck</span><strong>FZE998DI</strong></div><div><span>Mother lock</span><strong>487068971398</strong></div><div><span>Registry state</span><strong>M + B + C + D</strong></div><div><span>Updated registry</span><strong>M + B + D + C</strong></div><div><span>Mismatch class</span><strong>Slot order only</strong></div><div><span>Operational impact</span><strong>None indicated</strong></div></div><div class="section-title"><span>[ Decision context ]</span><b>Verification route</b></div><div class="panel-body"><p class="micro">Slot order differences do not constitute an equipment conflict. Verify the physical kit against either valid arrangement. If confirmed, preserve evidence and close the import review.</p></div></div><div class="panel"><div class="section-title"><span>[ Action mode ]</span><b>Supervisor</b></div><div class="decision-stack"><button class="button">Open verification</button><button class="button secondary">Update registry</button><button class="button danger">Resolve review</button><button class="button secondary">Dismiss with reason</button></div><dl class="status-list">${status('Source','Workbook import')}${status('Created','14 Jul 2026')}${status('Audit required','Yes','red')}</dl></div></section>`,

      settings: () => `${head('settings','System','Settings','Access, profile and data controls','SUP','Supervisor sees team, profile, appearance and exports. Installer access remains appearance-only.')}<section class="settings-layout"><div class="panel"><div class="section-title"><span>[ Team access ]</span><b>Supervisor only</b></div><div class="table-wrap"><table><thead><tr><th>User</th><th>Role</th><th>Status</th><th>Action</th></tr></thead><tbody><tr>${cell('User','Musa','Current user')}${cell('Role','Supervisor')}${cell('Status','Active')}${cell('Action','Manage')}</tr><tr>${cell('User','Installer account')}${cell('Role','Installer')}${cell('Status','Active')}${cell('Action','Manage')}</tr></tbody></table></div><div class="footer-note"><span>Add user form opens inside this section</span><button class="button">+ Add user</button></div><div class="section-title"><span>[ Data management ]</span><b>Exports</b></div><div class="panel-body field-row"><div><strong class="label">Operational export</strong><p class="micro">Registration, installation, movement, fault and audit data.</p></div><button class="button secondary">Open exports >>></button></div></div><div class="settings-stack"><div class="panel"><div class="section-title"><span>[ Profile ]</span><b>Musa</b></div><dl class="status-list">${status('Role','Supervisor')}${status('Password','Change')}${status('Session','Sign out','red')}</dl></div><div class="panel"><div class="section-title"><span>[ Appearance ]</span><b>System</b></div><div class="panel-body"><div class="theme-options"><button class="theme-option"><i></i><span>Light</span></button><button class="theme-option"><i></i><span>Dark</span></button><button class="theme-option is-active"><i></i><span>System</span></button></div></div></div></div></section>`
    };

    const routeSelect = document.getElementById('route-select');
    const preview = document.getElementById('preview');
    const root = document.getElementById('app-root');
    let currentRoute = 'dashboard';
    let currentMode = 'desktop';

    routes.forEach(([key,label], index) => {
      const option = document.createElement('option');
      option.value = key;
      option.textContent = `${String(index + 1).padStart(2,'0')} / ${label}`;
      routeSelect.appendChild(option);
    });

    function updateHash() { history.replaceState(null, '', `#${currentRoute}/${currentMode}`); }
    function render() {
      routeSelect.value = currentRoute;
      preview.classList.toggle('is-mobile', currentMode === 'mobile');
      document.querySelectorAll('.mode-button').forEach((button) => button.setAttribute('aria-selected', String(button.dataset.mode === currentMode)));
      root.innerHTML = shell(currentRoute, pages[currentRoute]());
      root.querySelectorAll('[data-route]').forEach((button) => button.addEventListener('click', () => selectRoute(button.dataset.route)));
      preview.scrollTo({ top: 0, behavior: 'instant' });
      window.scrollTo({ top: 0, behavior: 'instant' });
      updateHash();
    }
    function selectRoute(route) { if (pages[route]) { currentRoute = route; render(); } }
    function stepRoute(direction) { const index = routes.findIndex(([key]) => key === currentRoute); selectRoute(routes[(index + direction + routes.length) % routes.length][0]); }
    routeSelect.addEventListener('change', () => selectRoute(routeSelect.value));
    document.getElementById('prev-page').addEventListener('click', () => stepRoute(-1));
    document.getElementById('next-page').addEventListener('click', () => stepRoute(1));
    document.querySelectorAll('.mode-button').forEach((button) => button.addEventListener('click', () => { currentMode = button.dataset.mode; render(); }));
    const [hashRoute, hashMode] = location.hash.slice(1).split('/');
    if (pages[hashRoute]) currentRoute = hashRoute;
    if (hashMode === 'mobile') currentMode = 'mobile';
    render();
  </script>
</body>
</html>
